<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Lumina Dental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: block; /* Override center alignment from login */
            height: auto;
            background: #F1F5F9;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="brand-logo">Lumina Dental</div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item active">
                        <span>👥</span> Pacientes
                    </li>
                    <li class="nav-item">
                        <span>📅</span> Citas
                    </li>
                    <li class="nav-item">
                        <span>📊</span> Reportes
                    </li>
                    <li class="nav-item">
                        <span>⚙️</span> Configuración
                    </li>
                </ul>
            </nav>
            <div style="margin-top: auto;">
                <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 10px;">
                    <span>🚪</span> Cerrar Sesión
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div>
                    <h1 style="font-family: var(--font-heading); font-size: 1.8rem;">Gestión de Pacientes</h1>
                    <p style="color: var(--text-muted);">Administra la base de datos de tus pacientes.</p>
                </div>
                <button class="btn-primary" id="openAddModal" style="width: auto; padding: 12px 24px;">
                    + Nuevo Paciente
                </button>
            </header>

            <div class="card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Fecha Registro</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for CRUD -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle" style="margin-bottom: 20px; font-family: var(--font-heading);">Agregar Paciente</h2>
            <form id="patientForm">
                <input type="hidden" id="patientId">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="modalName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="modalEmail" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="modalPhone" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="social-btn" id="closeModal" style="margin: 0;">Cancelar</button>
                    <button type="submit" class="btn-primary" style="margin: 0;">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
