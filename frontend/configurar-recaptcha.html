<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar reCAPTCHA | Odontolyt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-8">
    <div class="max-w-xl mx-auto">
        <a href="inicio_de_sesion.html" class="text-cyan-700 text-sm hover:underline">← Volver al login</a>
        <h1 class="text-2xl font-bold mt-4 mb-2">Configurar reCAPTCHA</h1>
        <p class="text-slate-600 text-sm mb-6">Si ves «clave del sitio no válida», crea claves nuevas y regístralas aquí.</p>

        <div id="ok" class="hidden mb-4 p-3 bg-green-50 text-green-800 rounded-lg text-sm"></div>
        <div id="err" class="hidden mb-4 p-3 bg-red-50 text-red-800 rounded-lg text-sm"></div>

        <ol class="list-decimal list-inside space-y-3 text-sm text-slate-700 mb-6">
            <li>Entra a <a class="text-cyan-700 underline" href="https://www.google.com/recaptcha/admin/create" target="_blank">Google reCAPTCHA Admin</a></li>
            <li>Tipo: <strong>Casilla de verificación v2</strong> («No soy un robot»)</li>
            <li>Dominios: <code class="bg-slate-200 px-1 rounded">localhost</code> y <code class="bg-slate-200 px-1 rounded">127.0.0.1</code></li>
            <li>Copia clave del sitio y clave secreta</li>
        </ol>

        <form id="form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Clave del sitio (Site key)</label>
                <input id="siteKey" type="text" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="6Lc..."/>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Clave secreta (Secret key)</label>
                <input id="secretKey" type="text" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="6Lc..."/>
            </div>
            <button type="submit" class="w-full py-3 bg-cyan-800 text-white rounded-lg font-semibold hover:bg-cyan-900">Guardar claves</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('form');
        const ok = document.getElementById('ok');
        const err = document.getElementById('err');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            ok.classList.add('hidden');
            err.classList.add('hidden');
            try {
                const res = await fetch('/api/setup/recaptcha-keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        siteKey: document.getElementById('siteKey').value.trim(),
                        secretKey: document.getElementById('secretKey').value.trim()
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                ok.innerHTML = '✓ Guardado. <a href="inicio_de_sesion.html" class="underline">Probar login</a>';
                ok.classList.remove('hidden');
            } catch (ex) {
                err.textContent = ex.message;
                err.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
