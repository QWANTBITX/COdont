<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontolyt | Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box glass animate-fade">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo text-gradient" style="margin-bottom: 30px;">Odontolyt</div>
            </a>
            <h2>Bienvenido</h2>
            <p>Acceda a su portal de salud personalizada</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@odontolyt.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Verificación de seguridad</label>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0 0 10px;">reCAPTCHA — prueba humano vs bot (puede pedir selección de imágenes).</p>
                    <div id="recaptcha-container" style="display: flex; justify-content: center; min-height: 78px;"></div>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Iniciar Sesión</button>
            </form>

            <div class="social-divider" style="margin-top: 28px;"><span>O continúa con</span></div>
            <div style="display: flex; justify-content: center; margin-bottom: 8px;" id="googleSignInContainer"></div>
            <p id="googleConfigNotice" class="hidden" style="font-size: 0.75rem; color: var(--text-muted); text-align: center; line-height: 1.5;">
                Configura <strong>GOOGLE_CLIENT_ID</strong> en <code>backend/.env</code> para habilitar Google.
            </p>
            
            <div style="margin-top: 24px; font-size: 0.9rem;">
                <p>¿No tiene una cuenta? <a href="#" class="text-gradient" style="font-weight: 600; text-decoration: none;">Crear cuenta</a></p>
                <p style="margin-top: 10px;"><a href="index.html" style="color: var(--text-muted); text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver al inicio</a></p>
            </div>
        </div>
    </div>

    <footer class="w-full bg-slate-50 border-t border-slate-200 py-4">
        <div data-odontolyt-social="bar"></div>
    </footer>
    <link rel="stylesheet" href="css/social-footer.css">
    <script src="js/social-footer.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/recaptcha.js"></script>
    <script src="js/main-animations.js"></script>
    <script src="js/main-auth.js"></script>
    <script src="js/google-auth.js"></script>
</body>
</html>
