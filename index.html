<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Lumina Dental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-sidebar {
            background-image: url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?q=80&w=2070&auto=format&fit=crop');
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Sidebar with Brand and Image -->
        <aside class="auth-sidebar">
            <div class="sidebar-content">
                <h2>Tu salud dental, redefinida con serenidad.</h2>
                <p>Experimenta la odontología moderna en un entorno diseñado para tu bienestar absoluto.</p>
            </div>
        </aside>

        <!-- Login Form Section -->
        <main class="auth-form-section">
            <div class="form-header">
                <h1>Bienvenido de Nuevo</h1>
                <p>Ingresa a tu portal de salud personalizada.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@lumina.com" required>
                </div>

                <div class="form-group">
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">
                    Iniciar Sesión
                </button>
            </form>

            <div class="social-divider">
                <span>O inicia sesión con</span>
            </div>

            <div class="social-buttons">
                <button class="social-btn">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
                    Google
                </button>
                <button class="social-btn">
                    <img src="https://www.svgrepo.com/show/448204/apple.svg" alt="Apple">
                    Apple
                </button>
            </div>

            <div class="auth-footer">
                ¿No tienes una cuenta todavía? <a href="register.html">Crear cuenta</a>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
